name: Build r8127 with ich777 GCC14

on:
  workflow_dispatch:
    inputs:
      unraid_ver:
        description: 'Target Unraid Version'
        required: true
        default: '7.2.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile r8127 Driver
        run: |
          # 使用 --entrypoint 覆盖镜像自带的启动脚本，防止它去跑 uname 检测
          docker run --privileged --rm \
            --entrypoint /bin/bash \
            -v ${{ github.workspace }}:/source \
            ghcr.io/ich777/unraid_kernel:gcc_14.2.0 \
            -c "
              # 1. 强制指定你要为哪个 Unraid 内核版本编译
              # 注意：请务必去你的 Unraid 终端输入 uname -r 确认这个版本号！
              # 如果是 7.3.0 正式版，内核可能是 6.18.x-Unraid 
              TARGET_KERNEL='6.18.26-Unraid'
              
              echo '--- 正在手动下载 Unraid 内核源码 ---'
              mkdir -p /usr/src
              wget -q --show-progress -O /usr/src/linux-\$TARGET_KERNEL.tar.xz \
                \"https://github.com/ich777/unraid_kernel/releases/download/\$TARGET_KERNEL/linux-\$TARGET_KERNEL.tar.xz\"
              
              echo '--- 正在解压 ---'
              mkdir -p /usr/src/linux-\$TARGET_KERNEL
              tar -xf /usr/src/linux-\$TARGET_KERNEL.tar.xz -C /usr/src/linux-\$TARGET_KERNEL
              
              echo '--- 准备内核编译环境 ---'
              cd /usr/src/linux-\$TARGET_KERNEL
              # 这一步非常关键，生成编译驱动所需的脚本和头文件
              make -j$(nproc) scripts prepare
              
              echo '--- 开始编译驱动 ---'
              cd /source/source
              # 强制指向我们下载好的内核目录
              make KDIR=/usr/src/linux-\$TARGET_KERNEL
              
              echo '--- 编译成功！ ---'
              ls -l *.ko
            "

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: r8127-driver-${{ github.event.inputs.unraid_ver }}
          path: source/source/*.ko
