name: Build r8127 driver

on:
  workflow_dispatch:
    inputs:
      unraid_kernel:
        description: 'Unraid Kernel Version'
        required: true
        default: '6.18.26-Unraid'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile r8127 Driver
        run: |
          docker run --rm \
            --privileged \
            -e DL_ON_START=true \
            -e EXTRACT=true \
            -e OVERWRITE=false \
            -e CPU_THREADS=all \
            -e CLEANUP=false \
            -e UNAME=${{ github.event.inputs.unraid_kernel }} \
            -e DATA_DIR=/usr/src \
            -v ${{ github.workspace }}:/usr/src \
            --entrypoint "/bin/bash" \
            'ghcr.io/ich777/unraid_kernel:gcc_14.2.0' \
            -c "git config --global --add safe.directory /usr/src && cd /usr/src  && chmod +x start-container.sh && ./start-container.sh && chmod +x compile-actions.sh && ./compile-actions.sh"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r8127-unraid-package
          path: |
            ${{ github.workspace }}/*.txz
            ${{ github.workspace }}/*.txz.md5

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.unraid_kernel }}
          name: ${{ github.event.inputs.unraid_kernel }}
          body: |
            Automatically compiled r8127 driver for Unraid.
            
            - **Kernel Version**: ${{ github.event.inputs.unraid_kernel }}
            - **Compiler Container**: `ghcr.io/ich777/unraid_kernel:gcc_14.2.0`

          draft: false
          prerelease: false
          files: |
            ${{ github.workspace }}/*.txz
            ${{ github.workspace }}/*.txz.md5
