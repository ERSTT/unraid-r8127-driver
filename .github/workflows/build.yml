name: Build r8127 with ich777 GCC14

on:
  workflow_dispatch:
    inputs:
      unraid_ver:
        description: 'Target Unraid Version'
        required: true
        default: '7.2.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile r8127 Driver
        run: |
          # 1. 运行容器，但覆盖它的入口点(Entrypoint)，防止它运行那个会卡住的脚本
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/source \
            ghcr.io/ich777/unraid_kernel:gcc_14.2.0 \
            /bin/bash -c "
              # 2. 定义目标内核版本 (请根据你机器 uname -r 的真实输出填写)
              # 7.3.0-rc.2 对应的内核通常是 6.18.18-Unraid
              TARGET_KERNEL='6.18.18-Unraid'
              DATA_DIR='/usr/src'
              
              echo \"开始手动准备内核源码: \$TARGET_KERNEL\"
              
              # 3. 手动下载 ich777 预编译好的内核包
              wget -q --show-progress -O \$DATA_DIR/linux-\$TARGET_KERNEL.tar.xz \
                \"https://github.com/ich777/unraid_kernel/releases/download/\$TARGET_KERNEL/linux-\$TARGET_KERNEL.tar.xz\"
              
              # 4. 解压并准备环境
              mkdir -p \$DATA_DIR/linux-\$TARGET_KERNEL
              tar -xf \$DATA_DIR/linux-\$TARGET_KERNEL.tar.xz -C \$DATA_DIR/linux-\$TARGET_KERNEL
              
              # 5. 进入内核目录进行基本的编译准备
              cd \$DATA_DIR/linux-\$TARGET_KERNEL
              make -j$(nproc) scripts prepare
              
              # 6. 编译你的驱动
              echo \"内核就绪，开始编译驱动...\"
              cd /source/source
              # 通过 KDIR 参数强制指定内核路径
              make KDIR=\$DATA_DIR/linux-\$TARGET_KERNEL
              
              echo \"编译完成！\"
            "

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: r8127-driver-${{ github.event.inputs.unraid_ver }}
          path: source/source/*.ko
