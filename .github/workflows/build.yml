name: Build r8127 with ich777 GCC14

on:
  workflow_dispatch:
    inputs:
      unraid_ver:
        description: 'Target Unraid Version'
        required: true
        default: '7.2.5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile r8127 Driver
        run: |
          docker run --privileged --rm \
            --entrypoint /bin/bash \
            -v ${{ github.workspace }}:/work \
            ghcr.io/ich777/unraid_kernel:gcc_14.2.0 \
            -c "
              # 1. 设置内核版本（请确保 7.3.0 对应的内核号准确，这里以 6.18.18-Unraid 为例）
              TARGET_KERNEL='6.18.18-Unraid'
              KDIR=/usr/src/linux-\$TARGET_KERNEL
              
              # 2. 下载并准备内核源码
              mkdir -p /usr/src
              wget -q -O /usr/src/linux-\$TARGET_KERNEL.tar.xz \
                \"https://github.com/ich777/unraid_kernel/releases/download/\$TARGET_KERNEL/linux-\$TARGET_KERNEL.tar.xz\"
              mkdir -p \$KDIR
              tar -xf /usr/src/linux-\$TARGET_KERNEL.tar.xz -C \$KDIR
              cd \$KDIR && make -j$(nproc) scripts prepare
              
              # 3. 进入正确的源码目录
              # 根据仓库结构，Makefile 在 /work/source/ 目录下
              cd /work/source
              
              echo '--- 开始编译 ---'
              # 显式传递 KDIR 路径给 Makefile
              make KDIR=\$KDIR
              
              echo '--- 编译产物检查 ---'
              if [ -f r8127.ko ]; then
                echo '成功生成 r8127.ko'
                cp r8127.ko /work/
              else
                echo '编译失败，未发现 r8127.ko'
                ls -l
                exit 1
              fi
            "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r8127-driver-bin
          path: ./*.ko
