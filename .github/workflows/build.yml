name: Build r8127 with ich777 GCC14

on:
  workflow_dispatch:
    inputs:
      unraid_kernel:
        description: 'Unraid Kernel Version'
        required: true
        default: '6.18.26-Unraid'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile r8127 Driver
        run: |
          docker run --rm \
            --privileged \
            -e DL_ON_START=true \
            -e EXTRACT=true \
            -e OVERWRITE=false \
            -e CPU_THREADS=all \
            -e CLEANUP=false \
            -e UNAME=${{ github.event.inputs.unraid_kernel }} \
            -e DATA_DIR=/usr/src \
            -v ${{ github.workspace }}:/usr/src \
            'ghcr.io/ich777/unraid_kernel:gcc_14.2.0' \
            sh -c "/usr/src/start-container.sh && cd /usr/src && source compile.sh"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r8127-unraid-package
          path: |
            ${{ github.workspace }}/*.txz
            ${{ github.workspace }}/*.txz.md5
